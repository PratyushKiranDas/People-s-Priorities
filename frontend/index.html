<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>People's Priorities</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18212f;
      --muted: #667085;
      --line: #d8dee8;
      --panel: #ffffff;
      --page: #f6f8fb;
      --brand: #176b87;
      --brand-strong: #0b4a5f;
      --accent: #d98c24;
      --danger: #b42318;
      --good: #237a57;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page);
      color: var(--ink);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 1px solid transparent;
      border-radius: 6px;
      min-height: 40px;
      padding: 0 14px;
      cursor: pointer;
      background: var(--brand);
      color: #ffffff;
      font-weight: 700;
    }

    button.secondary {
      background: #ffffff;
      border-color: var(--line);
      color: var(--ink);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      padding: 10px 12px;
    }

    textarea {
      min-height: 116px;
      resize: vertical;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .topbar {
      min-height: 64px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 4;
    }

    .topbar-title {
      display: grid;
      gap: 2px;
    }

    .topbar-title strong {
      font-size: 1.05rem;
    }

    .topbar-title span {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .topbar-actions,
    .form-actions,
    .inline-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      min-height: calc(100vh - 64px);
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: #ffffff;
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 16px;
    }

    .content {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
      min-width: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(24, 33, 47, 0.08);
      padding: 16px;
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .panel h2,
    .panel h3 {
      margin: 0;
      letter-spacing: 0;
    }

    .panel-heading {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .priority-list,
    .submission-list {
      display: grid;
      gap: 10px;
      max-height: 360px;
      overflow: auto;
      padding-right: 2px;
    }

    .submission-list {
      max-height: none;
    }

    .priority-item,
    .submission-item,
    .tracking-result {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #ffffff;
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .meta {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .id-chip {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 8px;
      background: #f8fafc;
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 0.8rem;
      overflow-wrap: anywhere;
    }

    .pill,
    .status-banner {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 0 9px;
      background: #e9f3f6;
      color: var(--brand-strong);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-banner {
      background: #fff4df;
      color: #8a4b00;
    }

    .status-banner.done {
      background: #e8f5ee;
      color: var(--good);
    }

    .urgency {
      color: var(--danger);
      font-weight: 900;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status.error {
      color: var(--danger);
      font-weight: 700;
    }

    .status.good {
      color: var(--good);
      font-weight: 700;
    }

    .controls-form,
    .review-form {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      display: grid;
      gap: 10px;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: minmax(150px, 0.9fr) minmax(180px, 1.4fr) auto;
      gap: 10px;
      align-items: end;
    }

    .review-grid,
    .tracking-search {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    @media (max-width: 980px) {
      .dashboard {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }

    @media (max-width: 680px) {
      .topbar,
      .panel-heading,
      .row {
        align-items: stretch;
        flex-direction: column;
      }

      .grid-two,
      .controls-grid,
      .review-grid,
      .tracking-search {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <section id="dashboard-view">
    <header class="topbar">
      <div class="topbar-title">
        <strong>People's Priorities</strong>
        <span>Constituency request intake and work tracking</span>
      </div>
      <div class="topbar-actions">
        <button id="refresh" class="secondary" type="button">Refresh</button>
      </div>
    </header>

    <main class="dashboard">
      <aside class="sidebar">
        <form id="intake-form" class="panel">
          <div class="panel-heading">
            <h2>Citizen Intake</h2>
            <span id="submit-status" class="status"></span>
          </div>
          <label>
            Request
            <textarea id="text" name="text" placeholder="Broken streetlight near Ward 8 market"></textarea>
          </label>
          <div class="grid-two">
            <label>
              Ward
              <input id="ward-id" name="ward_id" type="text" placeholder="ward-8">
            </label>
            <label>
              Photo
              <input id="photo" name="photo" type="file" accept="image/*">
            </label>
          </div>
          <label>
            Address / Near Landmark
            <input id="address" name="address" placeholder="e.g., Near Ward 8 Main Market crossroad">
          </label>
          <div class="form-actions">
            <button id="use-location" class="secondary" type="button">Use Location</button>
            <button type="submit">Submit</button>
          </div>
        </form>

        <section class="panel">
          <div class="panel-heading">
            <h2>Ranked Priorities</h2>
          </div>
          <div id="priority-list" class="priority-list"></div>
        </section>
      </aside>

      <section class="content">
        <section class="panel" id="tracking-panel">
          <div class="panel-heading">
            <h2>Track Your Request</h2>
            <span id="tracking-status" class="status"></span>
          </div>
          <form id="tracking-form" class="tracking-search">
            <label>
              Request ID
              <input id="search-id" name="search_id" placeholder="Paste your request ID">
            </label>
            <button type="submit">Search</button>
          </form>
          <div id="tracking-result" class="tracking-result" hidden></div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>Recent Submissions</h2>
            <span id="dashboard-status" class="status"></span>
          </div>
          <div id="submission-list" class="submission-list"></div>
        </section>
      </section>
    </main>
  </section>

  <script type="module">
    const STATUSES = [
      "Noticed by Government",
      "Under Process",
      "Work Started",
      "Work Done"
    ];

    const state = {
      config: null,
      submissions: []
    };

    const refreshButton = document.querySelector("#refresh");
    const intakeForm = document.querySelector("#intake-form");
    const submitStatus = document.querySelector("#submit-status");
    const useLocationButton = document.querySelector("#use-location");
    const priorityList = document.querySelector("#priority-list");
    const submissionList = document.querySelector("#submission-list");
    const dashboardStatus = document.querySelector("#dashboard-status");
    const trackingForm = document.querySelector("#tracking-form");
    const trackingStatus = document.querySelector("#tracking-status");
    const trackingResult = document.querySelector("#tracking-result");

    function setStatus(node, message, tone = "") {
      node.textContent = message;
      node.className = `status ${tone}`.trim();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function statusClass(status) {
      return status === "Work Done" ? "status-banner done" : "status-banner";
    }

    function urgency(item) {
      return Number(item.urgency_score ?? item.analysis?.urgency_score ?? 1) || 1;
    }

    async function authHeaders() {
      return {};
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, {
        ...options,
        headers: {
          ...(await authHeaders()),
          ...(options.headers || {})
        }
      });
      if (!response.ok) {
        throw new Error(await response.text());
      }
      return response.json();
    }

    async function loadConfig() {
      const response = await fetch("/api/config");
      if (!response.ok) {
        throw new Error("Configuration endpoint failed.");
      }
      state.config = await response.json();
    }

    function statusOptions(selectedStatus) {
      return STATUSES.map((status) => `
        <option value="${escapeHtml(status)}" ${status === selectedStatus ? "selected" : ""}>${escapeHtml(status)}</option>
      `).join("");
    }

    function renderPriorities(items) {
      if (!items.length) {
        priorityList.innerHTML = `<div class="meta">No priorities yet.</div>`;
        return;
      }
      priorityList.innerHTML = items.slice(0, 20).map((item, index) => `
        <article class="priority-item">
          <div class="row">
            <strong>${index + 1}. ${escapeHtml(item.ward_name || item.ward_id)}</strong>
            <span class="pill">${escapeHtml(item.category)}</span>
          </div>
          <div class="row meta">
            <span>${escapeHtml(item.count)} reports</span>
            <span class="urgency">${Math.round(Number(item.demand_score || 0))}</span>
          </div>
          <div class="meta">${escapeHtml(item.latest_summary)}</div>
        </article>
      `).join("");
    }

    function renderSubmissions(items) {
      if (!items.length) {
        submissionList.innerHTML = `<div class="meta">No submissions yet.</div>`;
        return;
      }

      submissionList.innerHTML = items.slice(0, 60).map((item) => {
        const currentStatus = item.status || "Noticed by Government";
        const explanation = item.mp_explanation || "";
        const summary = item.analysis?.summary || item.text || "Media submission";
        const address = item.address ? `<div class="meta">${escapeHtml(item.address)}</div>` : "";
        const reviewForm = currentStatus === "Work Done" ? `
          <form class="review-form" data-review-id="${escapeHtml(item.id)}">
            <div class="review-grid">
              <label>
                Citizen Review
                <input name="citizen_review" type="number" min="1" max="5" placeholder="1 to 5" required>
              </label>
              <button type="submit">Submit Review</button>
            </div>
          </form>
        ` : "";

        return `
          <article class="submission-item">
            <div class="row">
              <span class="pill">${escapeHtml(item.category || item.analysis?.category || "other")}</span>
              <span class="urgency">${escapeHtml(urgency(item))}/10</span>
            </div>
            <div class="row">
              <span class="id-chip">${escapeHtml(item.id)}</span>
              <span class="${statusClass(currentStatus)}">${escapeHtml(currentStatus)}</span>
            </div>
            <strong>${escapeHtml(summary)}</strong>
            ${address}
            <div class="meta">${escapeHtml(item.channel || "web")} ${item.ward_id ? `- ${escapeHtml(item.ward_id)}` : ""}</div>
            ${explanation ? `<div class="meta"><strong>MP Note:</strong> ${escapeHtml(explanation)}</div>` : ""}
            <form class="controls-form" data-update-id="${escapeHtml(item.id)}">
              <div class="controls-grid">
                <label>
                  Status
                  <select name="status">${statusOptions(currentStatus)}</select>
                </label>
                <label>
                  MP Explanation
                  <input name="mp_explanation" value="${escapeHtml(explanation)}" placeholder="Reason, plan, or next step">
                </label>
                <button type="submit">Update</button>
              </div>
            </form>
            ${reviewForm}
          </article>
        `;
      }).join("");
    }

    async function updateSubmission(id, payload) {
      return fetchJson(`/api/submissions/${encodeURIComponent(id)}/update`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    }

    async function refreshDashboard() {
      setStatus(dashboardStatus, "Loading");
      const [submissionsPayload, prioritiesPayload] = await Promise.all([
        fetchJson("/api/submissions?limit=500"),
        fetchJson("/api/priorities?limit=500")
      ]);
      state.submissions = submissionsPayload.items || [];
      renderSubmissions(state.submissions);
      renderPriorities(prioritiesPayload.items || []);
      setStatus(dashboardStatus, `${state.submissions.length} active`, "good");
    }

    async function findSubmissionById(id) {
      const normalizedId = id.trim();
      let found = state.submissions.find((item) => item.id === normalizedId);
      if (found) return found;

      try {
        const directPayload = await fetchJson(`/api/submissions/${encodeURIComponent(normalizedId)}`);
        return directPayload.item || directPayload;
      } catch (error) {
        // This offline backend currently exposes list + update endpoints; fall back to list search.
      }

      const payload = await fetchJson("/api/submissions?limit=1000");
      state.submissions = payload.items || [];
      found = state.submissions.find((item) => item.id === normalizedId);
      return found || null;
    }

    function renderTrackingResult(item) {
      const currentStatus = item.status || "Noticed by Government";
      trackingResult.hidden = false;
      trackingResult.innerHTML = `
        <div class="row">
          <span class="id-chip">${escapeHtml(item.id)}</span>
          <span class="${statusClass(currentStatus)}">${escapeHtml(currentStatus)}</span>
        </div>
        <strong>${escapeHtml(item.analysis?.summary || item.text || "Request")}</strong>
        ${item.address ? `<div class="meta">${escapeHtml(item.address)}</div>` : ""}
        <div class="meta"><strong>MP Explanation:</strong> ${escapeHtml(item.mp_explanation || "No explanation added yet.")}</div>
      `;
    }

    refreshButton.addEventListener("click", async () => {
      try {
        await refreshDashboard();
      } catch (error) {
        setStatus(dashboardStatus, error.message, "error");
      }
    });

    useLocationButton.addEventListener("click", () => {
      intakeForm.address.value = "Current Device Location (GPS Simulated)";
      setStatus(submitStatus, "Address filled.", "good");
    });

    intakeForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus(submitStatus, "Submitting");
      const formData = new FormData(intakeForm);

      try {
        const response = await fetch("/api/submissions", { method: "POST", body: formData });
        if (!response.ok) throw new Error(await response.text());
        const saved = await response.json();
        intakeForm.reset();
        setStatus(submitStatus, `Submitted. ID: ${saved.id}`, "good");
        await refreshDashboard();
      } catch (error) {
        setStatus(submitStatus, error.message, "error");
      }
    });

    trackingForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const requestId = trackingForm.search_id.value.trim();
      trackingResult.hidden = true;
      if (!requestId) {
        setStatus(trackingStatus, "Enter a request ID.", "error");
        return;
      }

      try {
        setStatus(trackingStatus, "Searching");
        const item = await findSubmissionById(requestId);
        if (!item) {
          setStatus(trackingStatus, "Request not found or already archived.", "error");
          return;
        }
        renderTrackingResult(item);
        setStatus(trackingStatus, "Found", "good");
      } catch (error) {
        setStatus(trackingStatus, error.message, "error");
      }
    });

    submissionList.addEventListener("submit", async (event) => {
      const updateForm = event.target.closest("[data-update-id]");
      const reviewForm = event.target.closest("[data-review-id]");
      if (!updateForm && !reviewForm) return;
      event.preventDefault();

      try {
        if (updateForm) {
          const formData = new FormData(updateForm);
          await updateSubmission(updateForm.dataset.updateId, {
            status: formData.get("status"),
            mp_explanation: formData.get("mp_explanation")
          });
          setStatus(dashboardStatus, "Submission updated.", "good");
        }

        if (reviewForm) {
          const formData = new FormData(reviewForm);
          await updateSubmission(reviewForm.dataset.reviewId, {
            citizen_review: formData.get("citizen_review")
          });
          setStatus(dashboardStatus, "Review submitted.", "good");
        }

        await refreshDashboard();
      } catch (error) {
        setStatus(dashboardStatus, error.message, "error");
      }
    });

    try {
      await loadConfig();
      await refreshDashboard();
    } catch (error) {
      setStatus(dashboardStatus, error.message, "error");
    }
  </script>
</body>
</html>
